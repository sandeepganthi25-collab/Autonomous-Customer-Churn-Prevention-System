services:
  - name: churn-api
    runtime: python311
    region: oregon
    plan: free
    repo: https://github.com/sandeepganthi25-collab/Autonomous-Customer-Churn-Prevention-System
    branch: main
    rootDir: backend
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
